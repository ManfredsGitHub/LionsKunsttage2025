# =============================================================================
# nginx-Konfiguration — Kunsttage auf der Ludwigshöhe 2026
# =============================================================================
#
# Zieldatei auf dem Server: /etc/nginx/sites-available/kunsttage
# Aktivieren mit:
#   ln -s /etc/nginx/sites-available/kunsttage /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# WICHTIG: Die beiden limit_req_zone-Direktiven müssen im http{}-Block stehen.
# Entweder in /etc/nginx/nginx.conf einfügen ODER die Datei
# /etc/nginx/conf.d/kunsttage-limits.conf anlegen (wird automatisch geladen).
#
# Voraussetzungen:
#   - Certbot bereits ausgeführt: certbot --nginx -d kunsttage-ludwigshoehe.de
#     -d www.kunsttage-ludwigshoehe.de
#   - Next.js läuft auf 127.0.0.1:3000
#   - FastAPI läuft auf 127.0.0.1:8000
#
# =============================================================================
# Inhalt von /etc/nginx/conf.d/kunsttage-limits.conf (separate Datei anlegen):
#
#   limit_req_zone $binary_remote_addr zone=api:10m      rate=10r/s;
#   limit_req_zone $binary_remote_addr zone=allgemein:10m rate=30r/s;
#
# =============================================================================


# ── HTTP → HTTPS-Weiterleitung ────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name kunsttage-ludwigshoehe.de www.kunsttage-ludwigshoehe.de;

    # Let's Encrypt ACME-Challenge (Certbot braucht diesen Pfad)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Alles andere → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}


# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name kunsttage-ludwigshoehe.de www.kunsttage-ludwigshoehe.de;

    # ── SSL-Zertifikat (von Certbot automatisch eingetragen) ─────────────────
    ssl_certificate     /etc/letsencrypt/live/kunsttage-ludwigshoehe.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kunsttage-ludwigshoehe.de/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── TLS-Härtung ──────────────────────────────────────────────────────────
    # Certbot setzt ssl_protocols bereits in options-ssl-nginx.conf.
    # Explizit hier nur ergänzen, wenn ältere Certbot-Version das nicht tut:
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_prefer_server_ciphers on;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/kunsttage-access.log;
    error_log  /var/log/nginx/kunsttage-error.log warn;

    # ── Globale Limits ───────────────────────────────────────────────────────
    client_max_body_size 20M;   # Für Bild-Uploads ausreichend

    # ── Security-Header ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # X-XSS-Protection ist in modernen Browsern obsolet, schadet aber nicht:
    add_header X-XSS-Protection          "1; mode=block"                       always;

    # ── Versteckte Dateien und .env blockieren ───────────────────────────────
    # Verhindert, dass .env, .git, .htaccess o.Ä. ausgeliefert werden
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Next.js statische Assets (/_ next/static/) ────────────────────────────
    # Diese Dateien haben einen Content-Hash im Dateinamen → ewig cachen
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        expires        365d;
        add_header     Cache-Control "public, immutable" always;
        access_log     off;     # Kein Log-Spam für statische Assets
    }

    # ── Öffentliche Uploads (Bilder der Kunstwerke) ───────────────────────────
    # Falls Next.js die Uploads direkt über /uploads/ ausliefert:
    location /uploads/ {
        alias      /var/kunsttage/uploads/;
        expires    7d;
        add_header Cache-Control "public";
        access_log off;

        # Nur Bild-Dateitypen erlauben — alles andere blockieren
        location ~* \.(jpg|jpeg|png|webp|avif|gif)$ {
            # weiterleiten
        }
        location ~ {
            deny all;
            return 403;
        }
    }

    # ── FastAPI Backend (/api/) ───────────────────────────────────────────────
    location /api/ {
        # Rate Limiting: max. 10 Anfragen/Sekunde pro IP, kurze Bursts erlaubt
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts: API-Antworten sollten schnell kommen
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        # Puffer: verhindert, dass langsame Clients den Backend-Worker blockieren
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }

    # ── Next.js Frontend (alle anderen Pfade) ────────────────────────────────
    location / {
        # Etwas großzügigeres Rate Limit für normale Seitenaufrufe
        limit_req zone=allgemein burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket-Upgrade für Next.js Hot Reload (nur in Entwicklung nötig,
        # schadet in Produktion aber nicht)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Next.js SSR kann bei komplexen Seiten etwas länger brauchen
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }
}

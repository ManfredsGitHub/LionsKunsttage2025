# /etc/nginx/conf.d/kunsttage-limits.conf
#
# Rate-Limiting-Zonen für die Kunsttage-Site.
# Diese Datei gehört in den http{}-Block von nginx — /etc/nginx/conf.d/ wird
# automatisch von der Standard-nginx.conf eingebunden.
#
# Kopieren mit:
#   cp nginx-kunsttage-limits.conf /etc/nginx/conf.d/kunsttage-limits.conf
#   nginx -t && systemctl reload nginx

# API-Endpunkte: 10 Anfragen/Sekunde pro IP
# Verhindert automatisiertes Scraping und Brute-Force auf Login-Endpunkte
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Normale Seitenaufrufe: 30 Anfragen/Sekunde pro IP
# Ausreichend für normale Nutzung, blockiert automatisierte Crawler
limit_req_zone $binary_remote_addr zone=allgemein:10m rate=30r/s;
